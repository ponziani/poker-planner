<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Poker Weekend Alicante</title>
  <meta name="description" content="Plan het poker weekend in Alicante. Kies je naam en geef aan wanneer je beschikbaar bent."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <div id="loadingBar" class="loading-bar" style="display:none"></div>
  <div id="errorBanner" class="error-banner" style="display:none"></div>

  <header class="site-header">
    <div class="site-header__inner">
      <div class="site-header__logo">
        <div id="headerChipGold"></div>
        <div>
          <div class="site-header__title">Poker Weekend</div>
          <div class="site-header__sub">Alicante ☀</div>
        </div>
      </div>
      <div class="header-chips" aria-hidden="true" id="headerChipsRight"></div>
      <div id="storageBadge" class="storage-badge"></div>
    </div>
  </header>

  <main class="layout">

    <!-- LEFT: Voting panel -->
    <div class="col-vote">

      <!-- STEP 1: NAME -->
      <section class="panel" id="step1">
        <div class="panel__header">
          <span class="panel__suit">♠</span>
          <h2 class="panel__title">Wie ben jij?</h2>
        </div>
        <p class="panel__sub">Kies je naam of voeg jezelf toe.</p>
        <div class="name-grid" id="nameGrid"></div>
        <div class="add-player">
          <input type="text" id="newNameInput" class="text-input" placeholder="Naam toevoegen..." maxlength="18"/>
          <button class="btn-add" onclick="addName()" aria-label="Speler toevoegen">+</button>
        </div>
        <div class="panel__footer">
          <button class="btn-primary" id="step1Next" onclick="goStep(2)" disabled>
            Beschikbaarheid kiezen <span class="suit-sm">♦</span>
          </button>
        </div>
      </section>

      <!-- STEP 2: CALENDAR -->
      <section class="panel hidden" id="step2">
        <div class="panel__header">
          <span class="panel__suit red">♥</span>
          <h2 class="panel__title">Wanneer kan <span id="playerNameDisplay"></span>?</h2>
        </div>
        <p class="panel__sub">Selecteer de weekenden waarop je naar Alicante kan.</p>

        <div class="calendar-card">
          <div class="cal-nav-row">
            <button class="cal-arrow" onclick="prevMonth()" aria-label="Vorige maand">&#8249;</button>
            <span class="cal-month-label" id="calMonthLabel"></span>
            <button class="cal-arrow" onclick="nextMonth()" aria-label="Volgende maand">&#8250;</button>
          </div>
          <div class="cal-dow-row">
            <span>Ma</span><span>Di</span><span>Wo</span><span>Do</span><span>Vr</span>
            <span class="weekend-col">Za</span><span class="weekend-col">Zo</span>
          </div>
          <div class="cal-days" id="calDays"></div>
        </div>

        <div class="chips-section">
          <p class="chips-label">Jouw beschikbare weekenden</p>
          <div class="chips-wrap" id="chipsWrap"></div>
        </div>

        <div class="panel__footer two-btn">
          <button class="btn-ghost" onclick="goStep(1)">&#8592; Terug</button>
          <button class="btn-primary" onclick="submitVotes()">
            Opslaan <span class="suit-sm">♣</span>
          </button>
        </div>
      </section>

    </div>

    <!-- RIGHT: Live overview -->
    <div class="col-overview">
      <div class="overview-panel">
        <div class="overview-panel__header">
          <span class="panel__suit red">♦</span>
          <h2 class="panel__title">Stand van zaken</h2>
        </div>

        <div class="player-status" id="playerStatus"></div>
        <div class="divider"></div>
        <div class="best-date-card" id="bestDateCard"></div>
        <div class="bars-section" id="barsSection"></div>
        <div class="who-section" id="whoSection"></div>
        <div class="saved-toast" id="savedToast"></div>
      </div>
    </div>

  </main>

  <footer class="site-footer">
    <span>♠ Poker Weekend Alicante ♥</span>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
